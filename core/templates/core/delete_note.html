{% extends 'core/base.html' %}

{% block content %}
<h2>Are you sure you want to delete this note?</h2>

<p><strong>{{ note.title }}</strong></p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'core:home' %}">Cancel</a>

{% endblock %}
